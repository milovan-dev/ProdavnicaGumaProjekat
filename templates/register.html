<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registracija - Servis&Gume</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="glavna-navigacija">
        <div class="logo">
            <h2><a href="/">🛞 Servis&Gume</a></h2>
        </div>
        <div class="navigacija-desno">
            <a href="/" class="nazad-na-pocetnu">⬅ NAZAD NA POČETNU</a>
        </div>
    </nav>

    <div class="login-kontejner">
        <form action="/register" method="POST" class="login-forma">
            <h2 id="forma-naslov">Otvorite nalog</h2>
            
            {% if greska %}
                <div class="greska-poruka">{{ greska }}</div>
            {% endif %}

            <label for="ime">Ime i prezime:</label>
            <input type="text" id="ime" name="ime" required placeholder="Unesite vaše ime i prezime">

            <label for="email">E-mail adresa:</label>
            <input type="email" id="email" name="email" required placeholder="Unesite vaš e-mail">

            <label for="lozinka">Lozinka:</label>
            <input type="password" id="lozinka" name="lozinka" required placeholder="Izaberite jaku lozinku">

            <button type="submit" class="dugme-korpa" style="margin-top: 10px; width: 100%;">Registruj se</button>
            
            <p class="registracija-link">Već imate nalog? <a href="/login">Prijavite se ovde</a>.</p>
        </form>
    </div>

</body>
</html>
